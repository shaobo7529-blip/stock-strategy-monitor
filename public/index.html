<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邵波的美股策略优化</title>
<style>
  :root { --bg: #0a0e1a; --card: #111827; --border: #1e293b; --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
  .container { max-width: 1500px; margin: 0 auto; padding: 20px 24px; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #1e293b; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .status-bar { padding: 8px 14px; background: var(--card); border-radius: 8px; font-size: 0.85rem; color: var(--muted); border: 1px solid var(--border); flex: 1; min-width: 200px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border-radius: 12px; padding: 18px; border: 1px solid var(--border); transition: border-color 0.2s; }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .card-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
  .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.85rem; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-divider { border-top: 1px solid var(--border); margin: 8px 0; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
</style>
</head>
<body>
<div class="header">
  <h1>📊 <span>邵波的</span>美股策略优化</h1>
  <div class="subtitle">实时监控 · 多策略回测 · 数据驱动决策</div>
</div>
<div class="container">
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-run" onclick="loadData(true)">🔄 运行监控</button>
    <button class="btn btn-secondary" id="btn-csv" onclick="downloadCSV()">📥 下载 CSV</button>
    <button class="btn btn-secondary" onclick="document.getElementById('filters').classList.toggle('hidden')">🔍 筛选</button>
    <button class="btn btn-secondary" onclick="document.getElementById('stock-panel').classList.toggle('hidden')">⚙️ 管理股票</button>
    <div class="status-bar" id="status">点击「运行监控」开始</div>
  </div>
  <div id="warnings"></div>
  <div class="stock-panel hidden" id="stock-panel">
    <div class="panel-title">📋 股票列表管理</div>
    <div class="stock-tags" id="stock-tags"></div>
    <div class="stock-input-row">
      <input type="text" id="new-stock" placeholder="输入股票代码，如 AAPL 或 600519.SS" onkeydown="if(event.key==='Enter')addStock()">
      <button class="btn btn-primary" onclick="addStock()" style="padding:6px 14px">添加</button>
      <button class="btn btn-secondary" onclick="saveStocks()" style="padding:6px 14px">💾 保存</button>
    </div>
    <div class="panel-hint" id="stock-hint"></div>
  </div>
  <div class="stats-grid" id="stats"></div>
  <div class="table-section">
    <div class="filters hidden" id="filters">
      <div class="filter-row">
        <label>股票<select id="f-symbol"><option value="">全部</option></select></label>
        <label>策略<select id="f-strategy"><option value="">全部</option></select></label>
        <label>状态<select id="f-status"><option value="">全部</option><option value="completed">已完成</option><option value="pending">待更新</option></select></label>
        <label>日期从<input type="date" id="f-date-from"></label>
        <label>日期到<input type="date" id="f-date-to"></label>
        <label>次日≥<input type="number" id="f-min-next" step="0.1" placeholder="-∞"></label>
        <label>5日最大≥<input type="number" id="f-min-5d" step="0.1" placeholder="-∞"></label>
        <label>信号强度<select id="f-strength"><option value="">全部</option><option value="3">强</option><option value="2">中</option><option value="1">弱</option></select></label>
        <button class="btn btn-secondary" onclick="resetFilters()" style="align-self:flex-end;padding:6px 12px;font-size:0.75rem">重置</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-col="symbol">股票 <span class="si"></span></th>
          <th data-col="triggerDate">触发日期 <span class="si"></span></th>
          <th data-col="strategyType">策略 <span class="si"></span></th>
          <th data-col="signalStrength">信号强度 <span class="si"></span></th>
          <th data-col="triggerDayChange">触发日涨跌 <span class="si"></span></th>
          <th data-col="nextDayChange">次日涨跌 <span class="si"></span></th>
          <th data-col="maxGainIn5Days">5日最大 <span class="si"></span></th>
          <th data-col="day5Change">第5日 <span class="si"></span></th>
          <th data-col="status">状态 <span class="si"></span></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="table-footer" id="record-count"></div>
  </div>
</div>
<style>
  .table-section { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .filters { padding: 14px 16px; border-bottom: 1px solid var(--border); background: rgba(17,24,39,0.8); }
  .filters.hidden { display: none; }
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .filters label { font-size: 0.7rem; color: var(--muted); display: flex; flex-direction: column; gap: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .filters select, .filters input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; }
  .filters select { min-width: 90px; }
  .filters input[type="number"] { width: 80px; }
  .filters input[type="date"] { width: 130px; }
  .table-wrap { max-height: 62vh; overflow-y: auto; }
  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { padding: 10px 14px; text-align: right; border-bottom: 1px solid rgba(30,41,59,0.5); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  th:nth-child(2), td:nth-child(2) { text-align: left; }
  th:nth-child(3), td:nth-child(3) { text-align: left; }
  th:nth-child(4), td:nth-child(4) { text-align: center; }
  th:last-child, td:last-child { text-align: center; }
  th { background: var(--bg); color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2; transition: color 0.2s; }
  th:hover { color: var(--accent); }
  th .si { font-size: 0.65rem; opacity: 0.7; }
  tr { transition: background 0.15s; }
  tr:hover { background: rgba(59,130,246,0.05); }
  tr:nth-child(even) { background: rgba(17,24,39,0.3); }
  tr:nth-child(even):hover { background: rgba(59,130,246,0.05); }
  .table-footer { padding: 10px 16px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .pager a { color: var(--accent); cursor: pointer; padding: 4px 8px; text-decoration: none; }
  .pager a:hover { text-decoration: underline; }
  .pg-disabled { opacity: 0.3; padding: 4px 8px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge-pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-completed { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-strength-3 { background: rgba(34,197,94,0.2); color: var(--green); }
  .badge-strength-2 { background: rgba(234,179,8,0.2); color: var(--yellow); }
  .badge-strength-1 { background: rgba(239,68,68,0.2); color: var(--red); }
  .warnings { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 0.8rem; color: var(--yellow); }
  .loading { text-align: center; padding: 50px; color: var(--muted); }
  .stock-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .stock-panel.hidden { display: none; }
  .panel-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
  .stock-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 30px; }
  .stock-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,130,246,0.15); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .stock-tag .remove { cursor: pointer; opacity: 0.6; font-size: 0.9rem; }
  .stock-tag .remove:hover { opacity: 1; color: var(--red); }
  .stock-input-row { display: flex; gap: 8px; align-items: center; }
  .stock-input-row input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 0.85rem; flex: 1; max-width: 300px; }
  .panel-hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
  @media (max-width: 768px) { .container { padding: 12px; } .stats-grid { grid-template-columns: 1fr; } }
</style>
<script>
let allRecords = [];
let sortCol = 'triggerDate';
let sortDir = -1;
let currentPage = 1;
const PAGE_SIZE = 100;

const SL = {
  'single-day-drop': '单日跌幅', 'underperform-benchmark': '跑输基准',
  'rsi2-oversold': 'RSI(2)超卖', 'consecutive-down-days': '连续下跌', 'ma-pullback': '均线回踩',
  'cumulative-rsi2': '累积RSI(2)', 'vix-spike': 'VIX恐慌'
};
function strategyLabel(t) { return SL[t] || t; }
function fmt(n) { return n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function cls(n) { return n == null ? '' : n >= 0 ? 'positive' : 'negative'; }
function strengthBadge(n) {
  if (n == null) return '<span class="badge badge-strength-1">—</span>';
  if (n >= 3) return '<span class="badge badge-strength-3">强</span>';
  if (n >= 2) return '<span class="badge badge-strength-2">中</span>';
  return '<span class="badge badge-strength-1">弱</span>';
}

document.querySelector('thead').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const col = th.dataset.col;
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  currentPage = 1;
  renderTable();
});

document.getElementById('filters').addEventListener('change', () => { currentPage = 1; renderTable(); });
document.getElementById('filters').addEventListener('input', e => { if (e.target.tagName === 'INPUT') { currentPage = 1; renderTable(); } });

function resetFilters() {
  document.querySelectorAll('#filters select').forEach(s => s.value = '');
  document.querySelectorAll('#filters input').forEach(i => i.value = '');
  renderTable();
}

function getFiltered() {
  const fS = document.getElementById('f-symbol').value;
  const fSt = document.getElementById('f-strategy').value;
  const fSta = document.getElementById('f-status').value;
  const fDF = document.getElementById('f-date-from').value;
  const fDT = document.getElementById('f-date-to').value;
  const fMN = document.getElementById('f-min-next').value;
  const fM5 = document.getElementById('f-min-5d').value;
  const fStr = document.getElementById('f-strength').value;
  return allRecords.filter(r => {
    if (fS && r.symbol !== fS) return false;
    if (fSt && r.strategyType !== fSt) return false;
    if (fSta && r.status !== fSta) return false;
    if (fDF && r.triggerDate < fDF) return false;
    if (fDT && r.triggerDate > fDT) return false;
    if (fMN !== '' && (r.nextDayChange == null || r.nextDayChange < parseFloat(fMN))) return false;
    if (fM5 !== '' && (r.maxGainIn5Days == null || r.maxGainIn5Days < parseFloat(fM5))) return false;
    if (fStr !== '' && (r.signalStrength == null || r.signalStrength !== parseInt(fStr))) return false;
    return true;
  });
}

function getSorted(records) {
  return [...records].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = sortDir === 1 ? Infinity : -Infinity;
    if (vb == null) vb = sortDir === 1 ? Infinity : -Infinity;
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
}

function renderTable() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = sorted.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');
  document.querySelectorAll('th').forEach(th => {
    const icon = th.querySelector('.si');
    if (icon) icon.textContent = th.dataset.col === sortCol ? (sortDir === 1 ? '▲' : '▼') : '';
  });
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">无匹配记录</td></tr>';
  } else {
    tbody.innerHTML = pageData.map(r => `<tr>
      <td><strong>${r.symbol}</strong></td>
      <td style="color:var(--muted)">${r.triggerDate}</td>
      <td>${strategyLabel(r.strategyType)}</td>
      <td style="text-align:center">${strengthBadge(r.signalStrength)}</td>
      <td class="${cls(r.triggerDayChange)}">${fmt(r.triggerDayChange)}</td>
      <td class="${cls(r.nextDayChange)}">${fmt(r.nextDayChange)}</td>
      <td class="${cls(r.maxGainIn5Days)}">${fmt(r.maxGainIn5Days)}</td>
      <td class="${cls(r.day5Change)}">${fmt(r.day5Change)}</td>
      <td><span class="badge badge-${r.status}">${r.status === 'completed' ? '✓ 完成' : '⏳ 待更新'}</span></td>
    </tr>`).join('');
  }
  // 分页控件
  let pager = '';
  if (totalPages > 1) {
    pager = `<span class="pager">`;
    pager += currentPage > 1 ? `<a onclick="goPage(${currentPage-1})">◀ 上一页</a>` : `<span class="pg-disabled">◀ 上一页</span>`;
    pager += ` 第 ${currentPage}/${totalPages} 页 `;
    pager += currentPage < totalPages ? `<a onclick="goPage(${currentPage+1})">下一页 ▶</a>` : `<span class="pg-disabled">下一页 ▶</span>`;
    pager += `</span>`;
  }
  document.getElementById('record-count').innerHTML = `<span>显示 ${start+1}-${Math.min(start+PAGE_SIZE, sorted.length)} / ${sorted.length} 条（共 ${allRecords.length}）</span>${pager}`;
  
  // 根据筛选后的数据重新计算统计卡片
  renderStats(filtered);
}

function calcStatsLocal(records, strategyName) {
  const completed = records.filter(r => r.status === 'completed' && r.strategyType === strategyName && r.nextDayChange != null);
  if (completed.length === 0) return null;
  const ndc = completed.map(r => r.nextDayChange);
  const sum = ndc.reduce((a, b) => a + b, 0);
  const wins = ndc.filter(v => v > 0).length;
  const w5 = completed.filter(r => r.maxGainIn5Days != null && r.maxGainIn5Days > 0).length;
  const mg5 = completed.filter(r => r.maxGainIn5Days != null).map(r => r.maxGainIn5Days);
  const avgMg5 = mg5.length > 0 ? mg5.reduce((a, b) => a + b, 0) / mg5.length : 0;
  const wr5 = mg5.length > 0 ? w5 / mg5.length : 0;
  return {
    strategyType: strategyName, totalTriggers: completed.length,
    averageNextDayChange: sum / completed.length, winRate: wins / completed.length,
    avgMaxGainIn5Days: avgMg5, winRateIn5Days: wr5,
  };
}

function renderStats(filtered) {
  const types = [...new Set(filtered.map(r => r.strategyType))].sort();
  const stats = types.map(t => calcStatsLocal(filtered, t)).filter(s => s && s.totalTriggers > 0);
  const el = document.getElementById('stats');
  if (stats.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = stats.map(s => `<div class="stat-card">
    <div class="card-title">${strategyLabel(s.strategyType)}</div>
    <div class="stat-row"><span class="stat-label">触发次数</span><span class="stat-value">${s.totalTriggers}</span></div>
    <div class="stat-row"><span class="stat-label">次日胜率</span><span class="stat-value">${(s.winRate*100).toFixed(1)}%</span></div>
    <div class="stat-row"><span class="stat-label">次日均值</span><span class="stat-value ${cls(s.averageNextDayChange)}">${fmt(s.averageNextDayChange)}</span></div>
    <div class="stat-divider"></div>
    <div class="stat-row"><span class="stat-label">5日内胜率</span><span class="stat-value" style="color:var(--accent)">${(s.winRateIn5Days*100).toFixed(1)}%</span></div>
    <div class="stat-row"><span class="stat-label">5日最大均值</span><span class="stat-value ${cls(s.avgMaxGainIn5Days)}">${fmt(s.avgMaxGainIn5Days)}</span></div>
  </div>`).join('');
}

function goPage(p) { currentPage = p; renderTable(); document.querySelector('.table-wrap').scrollTop = 0; }

function populateFilters() {
  const symbols = [...new Set(allRecords.map(r => r.symbol))].sort();
  const strategies = [...new Set(allRecords.map(r => r.strategyType))];
  document.getElementById('f-symbol').innerHTML = '<option value="">全部</option>' + symbols.map(s => `<option value="${s}">${s}</option>`).join('');
  document.getElementById('f-strategy').innerHTML = '<option value="">全部</option>' + strategies.map(s => `<option value="${s}">${strategyLabel(s)}</option>`).join('');
}

async function loadData(refresh) {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  document.getElementById('status').textContent = '正在获取数据，请稍候...';
  document.getElementById('tbody').innerHTML = '<tr><td colspan="9" class="loading">⏳ 加载中...</td></tr>';
  try {
    const res = await fetch('/api/monitor' + (refresh ? '?refresh=1' : ''));
    const data = await res.json();
    if (data.error) { document.getElementById('status').textContent = '❌ ' + data.error; return; }
    if (data.warnings?.length > 0) {
      document.getElementById('warnings').innerHTML = '<div class="warnings">⚠️ ' + data.warnings.join('<br>') + '</div>';
    } else { document.getElementById('warnings').innerHTML = ''; }
    allRecords = data.records;
    populateFilters();
    renderTable();
    document.getElementById('status').textContent = `✅ ${allRecords.length} 条记录` + (data.cached ? ' (缓存)' : ' (已刷新)');

    // 如果服务器还在预加载，5秒后自动重试
    if (data.loading) {
      document.getElementById('status').textContent = '⏳ 服务器正在预加载数据，5秒后自动刷新...';
      setTimeout(() => loadData(false), 5000);
      return;
    }
    // 统计卡片由 renderTable -> renderStats 自动计算，不再请求服务端
  } catch (e) {
    document.getElementById('status').textContent = '❌ 请求失败: ' + e.message;
  } finally { btn.disabled = false; }
}
function downloadCSV() { window.open('/api/csv', '_blank'); }

// --- 股票管理 ---
let currentStocks = [];

async function loadStocks() {
  try {
    const res = await fetch('/api/stocks');
    const data = await res.json();
    currentStocks = data.stocks || [];
    renderStockTags();
  } catch(e) { console.error('加载股票列表失败', e); }
}

function renderStockTags() {
  document.getElementById('stock-tags').innerHTML = currentStocks.map(s =>
    `<span class="stock-tag">${s}<span class="remove" onclick="removeStock('${s}')">✕</span></span>`
  ).join('');
}

function addStock() {
  const input = document.getElementById('new-stock');
  const val = input.value.trim().toUpperCase();
  if (!val) return;
  if (currentStocks.includes(val)) { document.getElementById('stock-hint').textContent = `${val} 已存在`; return; }
  currentStocks.push(val);
  input.value = '';
  renderStockTags();
  document.getElementById('stock-hint').textContent = `已添加 ${val}（点保存生效）`;
}

function removeStock(symbol) {
  currentStocks = currentStocks.filter(s => s !== symbol);
  renderStockTags();
  document.getElementById('stock-hint').textContent = `已移除 ${symbol}（点保存生效）`;
}

async function saveStocks() {
  try {
    const res = await fetch('/api/stocks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stocks: currentStocks })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('stock-hint').textContent = `✅ 已保存 ${currentStocks.length} 只股票，点运行监控刷新数据`;
    } else {
      document.getElementById('stock-hint').textContent = `❌ ${data.error}`;
    }
  } catch(e) { document.getElementById('stock-hint').textContent = `❌ 保存失败: ${e.message}`; }
}

loadStocks();
